spring.application.name=gerenciador-cardapio-spring

# Swagger UI
springdoc.api-docs.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.info.title=Minha API
springdoc.info.description=API de teste com Swagger
springdoc.info.version=1.0
spring.datasource.url=jdbc:postgresql://localhost:5432/gerenciadorDeCardapioSpring
spring.datasource.username=postgres
spring.datasource.password=root

# criar/atualizar tabelas automaticamente pelo Hibernate
spring.jpa.hibernate.ddl-auto=update

# Mostrar os comandos SQL no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true